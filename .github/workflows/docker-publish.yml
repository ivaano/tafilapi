name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          docker login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/ivaano/tafilapi:${{ steps.tag.outputs.version }} \
            -t ghcr.io/ivaano/tafilapi:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/ivaano/tafilapi:${{ steps.tag.outputs.version }}
          docker push ghcr.io/ivaano/tafilapi:latest

      - name: Logout from registry
        if: always()
        run: docker logout ghcr.io
